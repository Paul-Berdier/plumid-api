# =====================================================================
# PlumID — Local 3-container stack
# ---------------------------------------------------------------------
# Mirrors the Railway target architecture:
#   - postgres   : custom Postgres image bootstrapped from db/initdb/
#   - api        : FastAPI service (this repository)
#   - model      : Pipeline-as-a-service (sibling repo plumid-model)
#
# Usage:
#   docker compose up -d --build
#
# The `model` service expects the plumid-model directory to live next
# to plumid-api on disk. If that's not the case, point the build context
# explicitly with MODEL_BUILD_CONTEXT (default ../plumid-model).
# =====================================================================

services:
  postgres:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: plumid-db:latest
    container_name: plumid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
      POSTGRES_DB: ${POSTGRES_DB:-plumid}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - plumid_pgdata:/var/lib/postgresql/data
    networks:
      - plumid_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plumid}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: plumid-api:latest
    container_name: plumid-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # The API logs in as the application role created by the init script.
      DATABASE_URL: postgresql+psycopg2://plumid_app:AppUser123!@postgres:5432/${POSTGRES_DB:-plumid}
      MODEL_SERVICE_URL: http://model:8001
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    networks:
      - plumid_internal

  model:
    build:
      context: ${MODEL_BUILD_CONTEXT:-../plumid-model}
      dockerfile: Dockerfile
    image: plumid-model:latest
    container_name: plumid-model
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${MODEL_LOG_LEVEL:-INFO}
    ports:
      - "${MODEL_HOST_PORT:-8001}:8001"
    networks:
      - plumid_internal

volumes:
  plumid_pgdata:

networks:
  plumid_internal:
    driver: bridge
